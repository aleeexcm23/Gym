<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GymX</title>

<style>
/* -------------------- */
/* ESTILO GLOBAL */
/* -------------------- */

:root {
  --bg: #05060a;
  --panel: #0b0f1a;
  --accent: #35d0ff;
  --accent-soft: rgba(53, 208, 255, 0.15);
  --text: #f5f7ff;
  --muted: #8b93b8;
  --danger: #ff4b6e;
  --border: #1a2135;
}

* {
  box-sizing: border-box;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
}

body {
  margin: 0;
  background: radial-gradient(circle at top, #10152b 0, #05060a 55%);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
}

/* -------------------- */
/* LAYOUT */
/* -------------------- */

.app {
  display: grid;
  grid-template-columns: 300px 1fr;
  width: 100%;
  height: 100%;
  position: relative;
}

@media (max-width: 900px) {
  .app {
    grid-template-columns: 1fr;
  }
}

/* -------------------- */
/* PANEL */
/* -------------------- */

.panel {
  background: var(--panel);
  border-right: 1px solid var(--border);
  padding: 16px;
  overflow-y: auto;
  transition: transform 0.25s ease;
  z-index: 10;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.panel.oculto {
  transform: translateX(-100%);
}

.toggle-panel {
  position: absolute;
  top: 10px;
  left: 10px;
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  padding: 6px 10px;
  cursor: pointer;
  z-index: 20;
}

/* -------------------- */
/* BLOQUES */
/* -------------------- */

.block {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 18px;
}

.block.micro {
  background: rgba(255,255,255,0.06);
}

.block.dia {
  background: rgba(255,255,255,0.03);
  margin-left: 12px;
}

.block-content {
  margin-top: 12px;
  padding-left: 10px;
  border-left: 2px solid var(--accent-soft);
}

.block-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
}

.block-header input {
  background: transparent;
  border: none;
  color: var(--text);
  font-size: 1.1rem;
  width: 100%;
}

.chevron {
  font-size: 1.2rem;
  color: var(--accent);
  margin-left: 10px;
}

.hidden {
  display: none;
}

.add-btn {
  margin-top: 10px;
  padding: 10px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
}

.add-btn:hover {
  border-color: var(--accent);
}

/* -------------------- */
/* LOGO */
/* -------------------- */

.logo-gymx {
  margin-top: 40px;
  text-align: center;
  font-size: 1.3rem;
  font-weight: 600;
  opacity: 0.7;
  letter-spacing: 1px;
  color: var(--text);
}

.logo-gymx .x-blue {
  color: var(--accent);
  font-weight: 900;
}

/* -------------------- */
/* CONTENIDO PRINCIPAL */
/* -------------------- */

.main {
  padding: 16px;
  overflow-y: auto;
  height: 100%;
}

/* -------------------- */
/* EJERCICIOS */
/* -------------------- */

.exercise-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  margin-left: 24px;
  box-shadow: 0 0 10px rgba(53,208,255,0.15);
  border-radius: 8px;
  overflow: hidden;
}

.exercise-table th,
.exercise-table td {
  border: 1px solid var(--border);
  padding: 8px;
  text-align: center;
}

.exercise-table th {
  background: rgba(53,208,255,0.1);
  color: var(--accent);
  font-size: 0.8rem;
}

.exercise-table input {
  width: 100%;
  background: transparent;
  border: none;
  color: var(--text);
  text-align: center;
}

.delete-btn {
  color: var(--danger);
  cursor: pointer;
  font-size: 1.1rem;
}

</style>
</head>

<body>

<div class="app">

<button class="toggle-panel" id="togglePanel">⮜</button>

<!-- PANEL -->
<div class="panel" id="panel">

  <div>
    <h2>Mesociclos</h2>
    <div id="mesoList"></div>
    <div class="add-btn" id="addMeso">+ Añadir mesociclo</div>
  </div>

  <div class="logo-gymx">
    Gym<span class="x-blue">X</span>
  </div>

</div>

<!-- MAIN -->
<div class="main" id="mainContent">
  <h2>Bienvenido a GymX</h2>
  <p>Selecciona un mesociclo en la barra lateral.</p>
</div>

</div>

<script>
/* -------------------- */
/* ESTADO */
/* -------------------- */

let data = JSON.parse(localStorage.getItem("gymx-data") || "{}");
if (!data.mesos) data.mesos = [];

/* -------------------- */
/* ELEMENTOS */
/* -------------------- */

const panel = document.getElementById("panel");
const togglePanel = document.getElementById("togglePanel");
const mesoList = document.getElementById("mesoList");
const addMeso = document.getElementById("addMeso");
const main = document.getElementById("mainContent");

/* -------------------- */
/* PANEL */
/* -------------------- */

togglePanel.onclick = () => {
  panel.classList.toggle("oculto");
  togglePanel.textContent = panel.classList.contains("oculto") ? "⮞" : "⮜";
};

/* -------------------- */
/* RENDER MESOCICLOS */
/* -------------------- */

function renderMesos() {
  mesoList.innerHTML = "";
  data.mesos.forEach(m => {
    const div = document.createElement("div");
    div.className = "block";

    div.innerHTML = `
      <div class="block-header" onclick="openMeso('${m.id}')">
        <input value="${m.nombre}" onchange="renameMeso('${m.id}', this.value)">
        <span class="chevron">▸</span>
      </div>
    `;

    mesoList.appendChild(div);
  });
}

addMeso.onclick = () => {
  data.mesos.push({
    id: Date.now().toString(),
    nombre: "Nuevo mesociclo",
    micros: []
  });
  save();
  renderMesos();
};

/* -------------------- */
/* ABRIR MESOCICLO */
/* -------------------- */

function openMeso(id) {
  const meso = data.mesos.find(x => x.id === id);

  main.innerHTML = `
    <h2>${meso.nombre}</h2>
    <div id="microContainer"></div>
    <div class="add-btn" onclick="addMicro('${id}')">+ Añadir microciclo</div>
  `;

  renderMicros(id);
}

/* -------------------- */
/* MICRO CICLOS */
/* -------------------- */

function renderMicros(mesoId) {
  const meso = data.mesos.find(x => x.id === mesoId);
  const container = document.getElementById("microContainer");
  container.innerHTML = "";

  meso.micros.forEach(mi => {
    const div = document.createElement("div");
    div.className = "block micro";

    div.innerHTML = `
      <div class="block-header" onclick="toggleBlock(this)">
        <input value="${mi.nombre}" onchange="renameMicro('${mesoId}', '${mi.id}', this.value)">
        <span class="chevron">▾</span>
      </div>
      <div class="block-content">
        <div id="dias-${mesoId}-${mi.id}"></div>
        <div class="add-btn" onclick="addDia('${mesoId}', '${mi.id}')">+ Añadir día</div>
      </div>
    `;

    container.appendChild(div);
    renderDias(mesoId, mi.id);
  });
}

function addMicro(mesoId) {
  const meso = data.mesos.find(x => x.id === mesoId);
  meso.micros.push({
    id: Date.now().toString(),
    nombre: "Nuevo microciclo",
    dias: []
  });
  save();
  renderMicros(mesoId);
}

/* -------------------- */
/* DÍAS */
/* -------------------- */

function renderDias(mesoId, microId) {
  const meso = data.mesos.find(x => x.id === mesoId);
  const micro = meso.micros.find(x => x.id === microId);
  const container = document.getElementById(`dias-${mesoId}-${microId}`);
  container.innerHTML = "";

  micro.dias.forEach(d => {
    const div = document.createElement("div");
    div.className = "block dia";

    div.innerHTML = `
      <div class="block-header" onclick="toggleBlock(this)">
        <input value="${d.nombre}" onchange="renameDia('${mesoId}', '${microId}', '${d.id}', this.value)">
        <span class="chevron">▾</span>
      </div>
      <div class="block-content">
        <table class="exercise-table">
          <tr>
            <th>Ejercicio</th>
            <th>Series</th>
            <th>Top</th>
            <th>Back</th>
            <th>Notas</th>
            <th></th>
          </tr>
          ${d.ejercicios.map(ex => `
            <tr>
              <td><input value="${ex.ejercicio}" onchange="updateEx('${mesoId}','${microId}','${d.id}','${ex.id}','ejercicio',this.value)"></td>
              <td><input value="${ex.series}" onchange="updateEx('${mesoId}','${microId}','${d.id}','${ex.id}','series',this.value)"></td>
              <td><input value="${ex.top}" onchange="updateEx('${mesoId}','${microId}','${d.id}','${ex.id}','top',this.value)"></td>
              <td><input value="${ex.back}" onchange="updateEx('${mesoId}','${microId}','${d.id}','${ex.id}','back',this.value)"></td>
              <td><input value="${ex.notas}" onchange="updateEx('${mesoId}','${microId}','${d.id}','${ex.id}','notas',this.value)"></td>
              <td class="delete-btn" onclick="deleteEx('${mesoId}','${microId}','${d.id}','${ex.id}')">❌</td>
            </tr>
          `).join("")}
        </table>
        <div class="add-btn" onclick="addEx('${mesoId}','${microId}','${d.id}')">+ Añadir ejercicio</div>
      </div>
    `;

    container.appendChild(div);
  });
}

function addDia(mesoId, microId) {
  const micro = data.mesos.find(x => x.id === mesoId).micros.find(x => x.id === microId);
  micro.dias.push({
    id: Date.now().toString(),
    nombre: "Nuevo día",
    ejercicios: []
  });
  save();
  renderDias(mesoId, microId);
}

/* -------------------- */
/* EJERCICIOS */
/* -------------------- */

function addEx(mesoId, microId, diaId) {
  const dia = data.mesos.find(x => x.id === mesoId)
    .micros.find(x => x.id === microId)
    .dias.find(x => x.id === diaId);

  dia.ejercicios.push({
    id: Date.now().toString(),
    ejercicio: "",
    series: "",
    top: "",
    back: "",
    notas: ""
  });

  save();
  renderDias(mesoId, microId);
}

function updateEx(mesoId, microId, diaId, exId, field, value) {
  const dia = data.mesos.find(x => x.id === mesoId)
    .micros.find(x => x.id === microId)
    .dias.find(x => x.id === diaId);

  const ex = dia.ejercicios.find(x => x.id === exId);
  ex[field] = value;
  save();
}

function deleteEx(mesoId, microId, diaId, exId) {
  const dia = data.mesos.find(x => x.id === mesoId)
    .micros.find(x => x.id === microId)
    .dias.find(x => x.id === diaId);

  dia.ejercicios = dia.ejercicios.filter(x => x.id !== exId);
  save();
  renderDias(mesoId, microId);
}

/* -------------------- */
/* RENOMBRAR */
/* -------------------- */

function renameMeso(id, value) {
  data.mesos.find(x => x.id === id).nombre = value;
  save();
}

function renameMicro(mesoId, microId, value) {
  data.mesos.find(x => x.id === mesoId)
    .micros.find(x => x.id === microId).nombre = value;
  save();
}

function renameDia(mesoId, microId, diaId, value) {
  data.mesos.find(x => x.id === mesoId)
    .micros.find(x => x.id === microId)
    .dias.find(x => x.id === diaId).nombre = value;
  save();
}

/* -------------------- */
/* PLEGAR / DESPLEGAR */
/* -------------------- */

function toggleBlock(header) {
  const chevron = header.querySelector(".chevron");
  const content = header.parentElement.querySelector(".block-content");

  const isOpen = chevron.textContent === "▾";

  chevron.textContent = isOpen ? "▸" : "▾";
  content.classList.toggle("hidden");
}

/* -------------------- */
/* GUARDAR */
/* -------------------- */

function save() {
  localStorage.setItem("gymx-data", JSON.stringify(data));
}

/* -------------------- */
/* INICIO */
/* -------------------- */

renderMesos();

</script>

</body>
</html>
