<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GymX PRO</title>

<style>
/* -------------------- */
/* ESTILO GLOBAL FUTURISTA */
/* -------------------- */

:root {
  --bg: #05060a;
  --panel: #0b0f1a;
  --accent: #35d0ff;
  --accent-soft: rgba(53, 208, 255, 0.15);
  --text: #f5f7ff;
  --muted: #8b93b8;
  --danger: #ff4b6e;
  --border: #1a2135;
  --recent: #18263b;
}

* {
  box-sizing: border-box;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
}

body {
  margin: 0;
  background: radial-gradient(circle at top, #10152b 0, #05060a 55%);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
}

/* -------------------- */
/* LAYOUT PRINCIPAL */
/* -------------------- */

.app {
  display: grid;
  grid-template-columns: 300px 1fr;
  width: 100%;
  height: 100%;
  position: relative;
}

@media (max-width: 900px) {
  .app {
    grid-template-columns: 1fr;
  }
}

/* -------------------- */
/* PANEL LATERAL */
/* -------------------- */

.panel {
  background: var(--panel);
  border-right: 1px solid var(--border);
  padding: 16px;
  overflow-y: auto;
  transition: transform 0.25s ease;
  z-index: 10;
}

.panel.oculto {
  transform: translateX(-100%);
}

.toggle-panel {
  position: absolute;
  top: 10px;
  left: 10px;
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  padding: 6px 10px;
  cursor: pointer;
  z-index: 20;
}

/* -------------------- */
/* TARJETAS DE MESOCICLOS */
/* -------------------- */

.meso-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  padding: 14px;
  border-radius: 12px;
  margin-bottom: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  transition: border-color 0.2s;
}

.meso-card:hover {
  border-color: var(--accent);
}

.meso-delete {
  color: var(--danger);
  font-size: 1.2rem;
  cursor: pointer;
}

/* -------------------- */
/* BOTÓN CREAR MESOCICLO */
/* -------------------- */

.add-meso {
  background: rgba(53,208,255,0.1);
  border: 1px solid var(--accent);
  color: var(--accent);
  padding: 14px;
  border-radius: 12px;
  text-align: center;
  cursor: pointer;
  margin-top: 10px;
}

/* -------------------- */
/* CONTENIDO PRINCIPAL */
/* -------------------- */

.main {
  padding: 16px;
  overflow-y: auto;
  height: 100%;
}

/* -------------------- */
/* PESTAÑAS DE SEMANAS */
/* -------------------- */

.week-tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
}

.week-tab {
  flex: 1;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  padding: 12px;
  text-align: center;
  border-radius: 10px;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
}

.week-tab.active {
  border-color: var(--accent);
  background: rgba(53,208,255,0.15);
}

/* -------------------- */
/* LISTA DE EJERCICIOS */
/* -------------------- */

.exercise-list {
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px;
  background: rgba(255,255,255,0.03);
}

.exercise-row {
  display: grid;
  grid-template-columns: 1.4fr 0.6fr 0.6fr 0.6fr 0.3fr;
  padding: 10px 6px;
  border-bottom: 1px solid var(--border);
  align-items: center;
}

.exercise-row:last-child {
  border-bottom: none;
}

.exercise-row.recent {
  background: var(--recent);
  border-left: 3px solid var(--accent);
}

.delete-ex {
  color: var(--danger);
  font-size: 1.2rem;
  cursor: pointer;
}

/* -------------------- */
/* FORMULARIO EJERCICIO */
/* -------------------- */

.form {
  margin-top: 16px;
  display: grid;
  gap: 10px;
}

input, select {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  padding: 10px;
  border-radius: 10px;
  color: var(--text);
}

/* -------------------- */
/* BOTÓN GUARDAR FLOTANTE */
/* -------------------- */

.save-btn {
  position: absolute;
  bottom: 20px;
  right: 20px;
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #000;
  font-size: 1.4rem;
  cursor: pointer;
  box-shadow: 0 0 12px rgba(53,208,255,0.6);
}

</style>
</head>

<body>

<div class="app">

<button class="toggle-panel" id="togglePanel">⮜</button>

<!-- PANEL LATERAL -->
<div class="panel" id="panel">

  <h2>Mesociclos</h2>
  <div id="mesoContainer"></div>

  <div class="add-meso" id="addMeso">+ Crear mesociclo</div>

</div>

<!-- CONTENIDO PRINCIPAL -->
<div class="main">

  <h2 id="mesoTitle">Selecciona un mesociclo</h2>

  <div class="week-tabs" id="weekTabs" style="display:none;">
    <div class="week-tab" data-week="1">Semana 1</div>
    <div class="week-tab" data-week="2">Semana 2</div>
    <div class="week-tab" data-week="3">Semana 3</div>
    <div class="week-tab" data-week="4">Semana 4</div>
  </div>

  <div class="exercise-list" id="exerciseList"></div>

  <form class="form" id="exerciseForm" style="display:none;">
    <input id="exName" placeholder="Ejercicio" />
    <input id="exSeries" placeholder="Series" type="number" />
    <input id="exReps" placeholder="Reps" type="number" />
    <input id="exPeso" placeholder="Peso (kg)" type="number" />
    <select id="exGrupo">
      <option value="">Grupo muscular</option>
      <option>Pecho</option>
      <option>Espalda</option>
      <option>Pierna</option>
      <option>Hombro</option>
      <option>Bíceps</option>
      <option>Tríceps</option>
      <option>Core</option>
    </select>
  </form>

</div>

<!-- BOTÓN GUARDAR -->
<div class="save-btn" id="saveBtn">💾</div>

</div>

<script>
/* -------------------- */
/* ESTADO */
/* -------------------- */

let data = JSON.parse(localStorage.getItem("gymx-pro") || "{}");
if (!data.mesos) data.mesos = [];

let currentMeso = null;
let currentWeek = 1;

/* -------------------- */
/* ELEMENTOS */
/* -------------------- */

const panel = document.getElementById("panel");
const togglePanel = document.getElementById("togglePanel");
const mesoContainer = document.getElementById("mesoContainer");
const addMeso = document.getElementById("addMeso");
const mesoTitle = document.getElementById("mesoTitle");
const weekTabs = document.getElementById("weekTabs");
const exerciseList = document.getElementById("exerciseList");
const exerciseForm = document.getElementById("exerciseForm");
const saveBtn = document.getElementById("saveBtn");

/* -------------------- */
/* PANEL */
/* -------------------- */

togglePanel.onclick = () => {
  panel.classList.toggle("oculto");
  togglePanel.textContent = panel.classList.contains("oculto") ? "⮞" : "⮜";
};

/* -------------------- */
/* MESOCICLOS */
/* -------------------- */

function renderMesos() {
  mesoContainer.innerHTML = "";
  data.mesos.forEach(m => {
    const card = document.createElement("div");
    card.className = "meso-card";
    card.innerHTML = `
      <span>${m.nombre}</span>
      <span class="meso-delete">❌</span>
    `;
    card.onclick = e => {
      if (e.target.classList.contains("meso-delete")) {
        data.mesos = data.mesos.filter(x => x.id !== m.id);
        renderMesos();
        save();
        return;
      }
      openMeso(m.id);
    };
    mesoContainer.appendChild(card);
  });
}

addMeso.onclick = () => {
  const id = Date.now().toString();
  data.mesos.push({
    id,
    nombre: "Mesociclo " + (data.mesos.length + 1),
    semanas: {1:[],2:[],3:[],4:[]}
  });
  renderMesos();
  save();
};

/* -------------------- */
/* ABRIR MESOCICLO */
/* -------------------- */

function openMeso(id) {
  currentMeso = data.mesos.find(m => m.id === id);
  mesoTitle.textContent = currentMeso.nombre;
  weekTabs.style.display = "flex";
  exerciseForm.style.display = "grid";
  renderWeeks();
  renderExercises();
}

/* -------------------- */
/* SEMANAS */
/* -------------------- */

function renderWeeks() {
  [...weekTabs.children].forEach(tab => {
    tab.classList.toggle("active", tab.dataset.week == currentWeek);
    tab.onclick = () => {
      currentWeek = tab.dataset.week;
      renderWeeks();
      renderExercises();
    };
  });
}

/* -------------------- */
/* EJERCICIOS */
/* -------------------- */

function renderExercises() {
  if (!currentMeso) return;
  const list = currentMeso.semanas[currentWeek];
  exerciseList.innerHTML = "";

  list.forEach(ex => {
    const row = document.createElement("div");
    row.className = "exercise-row";
    row.innerHTML = `
      <span>${ex.nombre}</span>
      <span>${ex.series}</span>
      <span>${ex.reps}</span>
      <span>${ex.peso}</span>
      <span class="delete-ex">❌</span>
    `;
    row.querySelector(".delete-ex").onclick = () => {
      currentMeso.semanas[currentWeek] =
        currentMeso.semanas[currentWeek].filter(x => x.id !== ex.id);
      renderExercises();
    };
    exerciseList.appendChild(row);
  });
}

/* -------------------- */
/* AÑADIR EJERCICIO */
/* -------------------- */

exerciseForm.onchange = exerciseForm.oninput = () => {
  const ex = {
    id: Date.now().toString(),
    nombre: exName.value,
    series: exSeries.value,
    reps: exReps.value,
    peso: exPeso.value,
    grupo: exGrupo.value
  };

  if (!ex.nombre) return;

  currentMeso.semanas[currentWeek].push(ex);
  renderExercises();

  // Glow azul
  const rows = exerciseList.querySelectorAll(".exercise-row");
  const last = rows[rows.length - 1];
  last.classList.add("recent");
  setTimeout(() => last.classList.remove("recent"), 2500);

  // Limpiar campos
  exName.value = "";
  exSeries.value = "";
  exReps.value = "";
  exPeso.value = "";
  exGrupo.value = "";
};

/* -------------------- */
/* GUARDAR */
/* -------------------- */

function save() {
  localStorage.setItem("gymx-pro", JSON.stringify(data));
}

saveBtn.onclick = save;

/* -------------------- */
/* INICIO */
/* -------------------- */

renderMesos();

</script>

</body>
</html>
