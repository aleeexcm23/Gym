<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>GymX</title>

<style>
/* ---------------------- */
/* ESTILO MINIMAL‑TECH    */
/* ---------------------- */

:root {
  --bg: #0b0c10;
  --panel: #111317;
  --panel-light: #161920;
  --accent: #1e88e5;
  --accent-soft: rgba(30, 136, 229, 0.2);
  --text: #e5e7eb;
  --muted: #9ca3af;
  --border: #1f2937;
}

* {
  box-sizing: border-box;
  font-family: "Inter", system-ui, sans-serif;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ---------------------- */
/* BARRA LATERAL          */
/* ---------------------- */

.sidebar {
  width: 260px;
  background: var(--panel);
  border-right: 1px solid var(--border);
  padding: 1rem;
  display: flex;
  flex-direction: column;
  transition: transform 0.3s ease;
  position: relative;
}

.sidebar.hidden {
  transform: translateX(-260px);
}

.logo {
  font-size: 1.8rem;
  font-weight: 800;
  margin-bottom: 1.5rem;
}

.logo span {
  color: var(--accent);
}

.meso-list {
  flex: 1;
  overflow-y: auto;
}

.meso-item {
  padding: 0.7rem;
  border-radius: 6px;
  margin-bottom: 0.4rem;
  cursor: pointer;
  background: var(--panel-light);
  border: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.meso-item.active {
  border-color: var(--accent);
  background: var(--accent-soft);
}

.meso-item .delete {
  color: #e57373;
  cursor: pointer;
  font-size: 1.1rem;
}

/* Botón para ocultar barra */
.toggle-sidebar {
  position: absolute;
  top: 10px;
  right: -18px;
  background: var(--accent);
  border: none;
  color: white;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  cursor: pointer;
  transition: 0.3s;
  font-size: 1rem;
}

/* ---------------------- */
/* PANEL PRINCIPAL        */
/* ---------------------- */

.main {
  flex: 1;
  overflow-y: auto;
  padding: 1.5rem;
}

h2 {
  margin-top: 0;
}

/* Pestañas de semanas */
.tabs {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 1rem;
}

.tab {
  padding: 0.5rem 1rem;
  border-radius: 6px;
  background: var(--panel-light);
  border: 1px solid var(--border);
  cursor: pointer;
}

.tab.active {
  background: var(--accent);
  border-color: var(--accent);
}

/* Días */
.day {
  background: var(--panel-light);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1rem;
  margin-bottom: 1.5rem;
}

/* Encabezado columnas */
.columns {
  display: grid;
  grid-template-columns: 2fr 1fr 2fr 1fr 1fr;
  gap: 0.5rem;
  margin-bottom: 0.5rem;
  font-weight: 600;
  color: var(--muted);
}

/* Fila de ejercicio */
.exercise-row {
  display: grid;
  grid-template-columns: 2fr 1fr 2fr 1fr 1fr;
  gap: 0.5rem;
  margin-bottom: 0.6rem;
  align-items: center;
}

/* Inputs estilo A */
input, select {
  background: var(--panel);
  border: 1px solid var(--accent);
  color: var(--text);
  padding: 0.4rem;
  border-radius: 6px;
  font-size: 0.9rem;
  width: 100%;
}

input:focus, select:focus {
  outline: none;
  box-shadow: 0 0 6px var(--accent);
}

/* Botón añadir ejercicio */
.add-ex-btn {
  margin-top: 0.8rem;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--accent);
  color: white;
  border: none;
  font-size: 1.4rem;
  cursor: pointer;
}

/* ---------------------- */
/* BOTÓN GUARDAR FLOTANTE */
/* ---------------------- */

.save-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: var(--accent);
  color: white;
  border: none;
  font-size: 1.5rem;
  cursor: pointer;
  box-shadow: 0 0 15px rgba(30, 136, 229, 0.6);
  transition: 0.2s;
}

.save-btn:hover {
  transform: scale(1.1);
}

/* ---------------------- */
/* RESPONSIVE             */
/* ---------------------- */

@media (max-width: 800px) {
  .sidebar {
    position: absolute;
    z-index: 10;
    height: 100%;
  }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="logo">Gym<span>X</span></div>

  <button class="toggle-sidebar" id="toggleSidebar">⮜</button>

  <div class="meso-list" id="mesoList"></div>

  <button id="addMeso">+ Añadir mesociclo</button>
</div>

<!-- MAIN PANEL -->
<div class="main">
  <h2 id="mesoTitle">Selecciona un mesociclo</h2>

  <div class="tabs" id="tabs"></div>

  <div id="weekContent"></div>
</div>

<!-- BOTÓN GUARDAR -->
<button class="save-btn" id="saveBtn">💾</button>

<script>
/* ---------------------- */
/* ESTRUCTURA DE DATOS    */
/* ---------------------- */

let data = { mesocycles: [] };
let currentMeso = null;
let currentWeek = 0;

/* ---------------------- */
/* GUARDAR MANUAL         */
/* ---------------------- */

document.getElementById("saveBtn").onclick = () => {
  localStorage.setItem("gymx-data", JSON.stringify(data));
  alert("Cambios guardados");
};

/* ---------------------- */
/* CARGAR DATOS           */
/* ---------------------- */

function load() {
  const saved = localStorage.getItem("gymx-data");
  if (saved) data = JSON.parse(saved);
  renderSidebar();
}

load();

/* ---------------------- */
/* SIDEBAR                */
/* ---------------------- */

function renderSidebar() {
  const list = document.getElementById("mesoList");
  list.innerHTML = "";

  data.mesocycles.forEach((m, i) => {
    const div = document.createElement("div");
    div.className = "meso-item" + (i === currentMeso ? " active" : "");
    div.innerHTML = `
      <span>${m.name}</span>
      <span class="delete" onclick="deleteMeso(${i}); event.stopPropagation();">❌</span>
    `;
    div.onclick = () => selectMeso(i);
    list.appendChild(div);
  });
}

document.getElementById("addMeso").onclick = () => {
  data.mesocycles.push({
    name: "Mesociclo " + (data.mesocycles.length + 1),
    weeks: [createWeek(), createWeek(), createWeek(), createWeek()]
  });
  renderSidebar();
};

function deleteMeso(i) {
  data.mesocycles.splice(i, 1);
  currentMeso = null;
  document.getElementById("mesoTitle").textContent = "Selecciona un mesociclo";
  document.getElementById("tabs").innerHTML = "";
  document.getElementById("weekContent").innerHTML = "";
  renderSidebar();
}

/* ---------------------- */
/* SELECCIONAR MESOCICLO  */
/* ---------------------- */

function selectMeso(i) {
  currentMeso = i;
  currentWeek = 0;
  renderSidebar();
  renderMeso();
}

function renderMeso() {
  const meso = data.mesocycles[currentMeso];
  document.getElementById("mesoTitle").textContent = meso.name;

  renderTabs();
  renderWeek();
}

/* ---------------------- */
/* PESTAÑAS SEMANAS       */
/* ---------------------- */

function renderTabs() {
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = "";

  data.mesocycles[currentMeso].weeks.forEach((_, i) => {
    const t = document.createElement("div");
    t.className = "tab" + (i === currentWeek ? " active" : "");
    t.textContent = "Semana " + (i + 1);
    t.onclick = () => {
      currentWeek = i;
      renderTabs();
      renderWeek();
    };
    tabs.appendChild(t);
  });
}

/* ---------------------- */
/* SEMANA → DÍAS          */
/* ---------------------- */

function createWeek() {
  return [
    createDay("Día 1"),
    createDay("Día 2"),
    createDay("Día 3")
  ];
}

function createDay(name) {
  return {
    name,
  exercises: []
  };
}

function renderWeek() {
  const container = document.getElementById("weekContent");
  container.innerHTML = "";

  const week = data.mesocycles[currentMeso].weeks[currentWeek];

  week.forEach((day, dayIndex) => {
    const d = document.createElement("div");
    d.className = "day";

    d.innerHTML = `
      <h3 contenteditable="true">${day.name}</h3>

      <div class="columns">
        <div>Ejercicio</div>
        <div>Series</div>
        <div>Notas</div>
        <div>Top set</div>
        <div>Back off</div>
      </div>
    `;

    day.exercises.forEach((ex, exIndex) => {
      const row = document.createElement("div");
      row.className = "exercise-row";

      row.innerHTML = `
        <input type="text" value="${ex.name}" oninput="updateExercise(${dayIndex}, ${exIndex}, 'name', this.value)">
        <input type="number" value="${ex.series}" oninput="updateExercise(${dayIndex}, ${exIndex}, 'series', this.value)">
        <input type="text" value="${ex.notes}" oninput="updateExercise(${dayIndex}, ${exIndex}, 'notes', this.value)">

        <div style="display:flex; gap:4px;">
          <input type="number" value="${ex.top}" oninput="updateExercise(${dayIndex}, ${exIndex}, 'top', this.value)">
          <select onchange="updateExercise(${dayIndex}, ${exIndex}, 'topUnit', this.value)">
            <option ${ex.topUnit==='kg'?'selected':''}>kg</option>
            <option ${ex.topUnit==='lbs'?'selected':''}>lbs</option>
          </select>
        </div>

        <div style="display:flex; gap:4px;">
          <input type="number" value="${ex.back}" oninput="updateExercise(${dayIndex}, ${exIndex}, 'back', this.value)">
          <select onchange="updateExercise(${dayIndex}, ${exIndex}, 'backUnit', this.value)">
            <option ${ex.backUnit==='kg'?'selected':''}>kg</option>
            <option ${ex.backUnit==='lbs'?'selected':''}>lbs</option>
          </select>
        </div>
      `;

      d.appendChild(row);
    });

    const addBtn = document.createElement("button");
    addBtn.className = "add-ex-btn";
    addBtn.textContent = "+";
    addBtn.onclick = () => addExercise(dayIndex);

    d.appendChild(addBtn);
    container.appendChild(d);
  });
}

/* ---------------------- */
/* EJERCICIOS             */
/* ---------------------- */

function addExercise(dayIndex) {
  const week = data.mesocycles[currentMeso].weeks[currentWeek];
  week[dayIndex].exercises.push({
    name: "",
    series: "",
    notes: "",
    top: "",
    topUnit: "kg",
    back: "",
    backUnit: "kg"
  });
  renderWeek();
}

function updateExercise(dayIndex, exIndex, field, value) {
  data.mesocycles[currentMeso].weeks[currentWeek][dayIndex].exercises[exIndex][field] = value;
}

/* ---------------------- */
/* OCULTAR BARRA LATERAL  */
/* ---------------------- */

document.getElementById("toggleSidebar").onclick = () => {
  document.getElementById("sidebar").classList.toggle("hidden");
};
</script>

</body>
</html>
